name: CI

on:
  pull_request:
    branches:
      - '**'
      - '!release-please--branches--main'

permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/gradle/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Write local.properties
        run: |
          echo "TELEGRAM_API_ID=0" > android/local.properties
          echo "TELEGRAM_API_HASH=ci_placeholder" >> android/local.properties

      - name: Run unit tests
        id: test
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest
        continue-on-error: true

      - name: Post test results
        if: always()
        uses: actions/github-script@v7
        id: set-results
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Parse JUnit XML results
            const resultsDir = 'android/app/build/test-results/testDebugUnitTest';
            let passed = 0, failed = 0, skipped = 0;
            const failures = [];

            if (fs.existsSync(resultsDir)) {
              for (const file of fs.readdirSync(resultsDir).filter(f => f.endsWith('.xml'))) {
                const xml = fs.readFileSync(path.join(resultsDir, file), 'utf8');
                const tests = parseInt((xml.match(/tests="(\d+)"/) || [])[1] || '0');
                const fail  = parseInt((xml.match(/failures="(\d+)"/) || [])[1] || '0');
                const skip  = parseInt((xml.match(/skipped="(\d+)"/) || [])[1] || '0');
                passed  += tests - fail - skip;
                failed  += fail;
                skipped += skip;
                for (const m of xml.matchAll(/<testcase[^>]+name="([^"]+)"[^>]*classname="([^"]+)"[\s\S]*?<failure[^>]*>([\s\S]*?)<\/failure>/g)) {
                  failures.push(`**${m[2]}.${m[1]}**\n\`\`\`\n${m[3].trim().slice(0, 500)}\n\`\`\``);
                }
              }
            }

            const total = passed + failed + skipped;
            const icon = failed > 0 ? '❌' : '✅';
            let comment = `## ${icon} Test Results\n\n`;
            comment += `| ✅ Passed | ❌ Failed | ⏭ Skipped | Total |\n`;
            comment += `|:--------:|:--------:|:---------:|:-----:|\n`;
            comment += `| ${passed} | ${failed} | ${skipped} | ${total} |\n\n`;

            if (failures.length > 0) {
              comment += `<details>\n<summary>Failures</summary>\n\n${failures.join('\n\n')}\n</details>\n`;
            }

            core.setOutput('message', comment);
            core.setOutput('has_failures', failed > 0 ? 'true' : 'false');

      - uses: marocchino/sticky-pull-request-comment@v2
        if: always()
        with:
          header: Test Results
          message: ${{ steps.set-results.outputs.message }}
          hide_and_recreate: true
          hide_classify: OUTDATED

      - name: Fail if tests failed
        if: steps.test.outcome != 'success'
        run: exit 1
